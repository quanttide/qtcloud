name: qtcloud_studio
description: "量潮云协作目录 - 跨域事件注册、契约管理、流程编排"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  go_router: ^14.0.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.4.6
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/events.json
    - assets/contracts.json
    - assets/workflows.json
